<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pure Water at Home: Reverse Osmosis — Vicente Matus Icaza</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../template/template.css" />
</head>
<body>

  <!-- Sidebar (fixed overlay, toggled by JS) -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="../courses.html" class="back-link" id="back-link">← All courses</a>
      <div class="course-badge" id="sidebar-badge"></div>
      <div class="sidebar-title" id="sidebar-title"></div>
      <div class="sidebar-meta"  id="sidebar-meta"></div>
    </div>
    <nav class="lesson-nav" id="lesson-nav"></nav>
  </aside>

  <!-- Backdrop (mobile only) -->
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

  <!-- Main area — shifts right on desktop when sidebar open -->
  <div class="main-area" id="main-area">

    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menu-toggle" title="Toggle lesson index">☰</button>
        <div class="topbar-lesson">
          Lesson <span class="counter" id="lesson-counter">— / —</span>
          &nbsp;·&nbsp;
          <span class="lesson-title-top" id="lesson-title-top">…</span>
        </div>
      </div>
      <div class="topbar-right">
        <button class="nav-btn" id="prev-btn" onclick="window._course.prev()" disabled>← Prev</button>
        <button class="nav-btn primary" id="next-btn" onclick="window._course.next()">Next →</button>
        <span class="progress-pill" id="progress-pill">— / —</span>
        <button class="fullscreen-btn" id="fullscreen-btn" title="Toggle fullscreen (F)">⛶</button>
      </div>
    </div>

    <div class="lesson-area" id="lesson-area">
      <div id="slide-container"></div>
    </div>

  </div><!-- /main-area -->

  <div class="progress-bar" id="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <script src="../template/course-data-osmosis.js"></script>
  <script src="../template/template.js"></script>
</body>
</html>
