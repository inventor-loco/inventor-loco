<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Reverse osmosis process flow</title>
  <desc id="desc">Diagram of feed water moving through pre-filters into a membrane housing, splitting into permeate and concentrate.</desc>
  <defs>
    <linearGradient id="water" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="waste" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 Z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrowCyan" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 Z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowOrange" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 Z" fill="#f97316"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="#f8fafc"/>

  <g filter="url(#shadow)">
    <path d="M70 320 H210 L280 390 L210 460 H70 Z" fill="#1d4ed8"/>
    <text x="145" y="365" fill="#ffffff" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="34" font-weight="700" text-anchor="middle">FEED</text>
    <text x="145" y="405" fill="#ffffff" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="34" font-weight="700" text-anchor="middle">WATER</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="320" y="250" width="180" height="260" rx="8" fill="#ffffff" stroke="#1d4ed8" stroke-width="8"/>
    <text x="410" y="355" fill="#1d4ed8" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="34" font-weight="700" text-anchor="middle">PRE-</text>
    <text x="410" y="395" fill="#1d4ed8" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="34" font-weight="700" text-anchor="middle">FILTERS</text>
  </g>

  <line x1="280" y1="390" x2="320" y2="390" stroke="#1d4ed8" stroke-width="22" marker-end="url(#arrowBlue)"/>

  <g filter="url(#shadow)">
    <path d="M610 110 H900 V200 L780 230 L610 200 Z" fill="#1f77b4"/>
    <rect x="540" y="170" width="500" height="360" fill="#ffffff" stroke="#1f77b4" stroke-width="8"/>
    <text x="755" y="165" fill="#ffffff" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="36" font-weight="700" text-anchor="middle">MEMBRANE</text>
    <text x="755" y="208" fill="#ffffff" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="36" font-weight="700" text-anchor="middle">HOUSING</text>

    <ellipse cx="760" cy="390" rx="92" ry="126" fill="#e0f2fe" stroke="#1f77b4" stroke-width="8"/>
    <ellipse cx="760" cy="390" rx="84" ry="118" fill="none" stroke="#1f77b4" stroke-width="4"/>
    <ellipse cx="760" cy="390" rx="76" ry="110" fill="none" stroke="#1f77b4" stroke-width="4"/>
    <ellipse cx="760" cy="390" rx="68" ry="102" fill="none" stroke="#1f77b4" stroke-width="4"/>
    <ellipse cx="760" cy="390" rx="60" ry="94" fill="none" stroke="#1f77b4" stroke-width="4"/>
  </g>

  <line x1="500" y1="390" x2="590" y2="390" stroke="#1d4ed8" stroke-width="22" marker-end="url(#arrowBlue)"/>

  <path d="M650 390 H1080" stroke="url(#water)" stroke-width="28" fill="none" marker-end="url(#arrowCyan)"/>
  <text x="890" y="355" fill="#1f77b4" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="28" font-weight="700">PERMEATE</text>

  <path d="M760 410 C820 450 860 480 930 495 H990 V580" stroke="url(#waste)" stroke-width="24" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="820" y="458" fill="#f97316" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="28" font-weight="700">CONCENTRATE</text>

  <g filter="url(#shadow)">
    <rect x="1090" y="300" width="145" height="190" rx="8" fill="#ffffff" stroke="#1f77b4" stroke-width="8"/>
    <text x="1162" y="372" fill="#1f77b4" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">CLEAN</text>
    <text x="1162" y="408" fill="#1f77b4" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">WATER</text>
    <text x="1162" y="444" fill="#1f77b4" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">STORAGE</text>
    <circle cx="1228" cy="308" r="34" fill="#4ade80"/>
    <path d="M1214 309 l10 10 l18 -22" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M960 580 H1140 V650 L1050 700 L960 650 Z" fill="#f97316"/>
    <text x="1050" y="632" fill="#ffffff" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="30" font-weight="700" text-anchor="middle">DRAIN</text>
    <text x="1050" y="668" fill="#ffffff" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="30" font-weight="700" text-anchor="middle">LINE</text>
  </g>
</svg>
