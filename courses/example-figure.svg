<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220" font-family="'IBM Plex Mono', monospace">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#1a56db"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="480" height="220" fill="#f2f2f2" rx="4"/>

  <!-- TX block -->
  <rect x="24" y="70" width="100" height="80" fill="white" stroke="#e0e0e0" stroke-width="1.5" rx="3"/>
  <text x="74" y="101" font-size="9" fill="#888" text-anchor="middle" letter-spacing="0.08em">TX</text>
  <text x="74" y="117" font-size="11" fill="#0d0d0d" text-anchor="middle" font-weight="500">LED</text>
  <text x="74" y="132" font-size="8" fill="#888" text-anchor="middle">850 nm</text>

  <!-- Channel block -->
  <rect x="190" y="70" width="100" height="80" fill="white" stroke="#e0e0e0" stroke-width="1.5" rx="3"/>
  <text x="240" y="101" font-size="9" fill="#888" text-anchor="middle" letter-spacing="0.08em">CHANNEL</text>
  <text x="240" y="117" font-size="11" fill="#0d0d0d" text-anchor="middle" font-weight="500">Optical</text>
  <text x="240" y="132" font-size="8" fill="#888" text-anchor="middle">LOS · NLOS</text>

  <!-- RX block -->
  <rect x="356" y="70" width="100" height="80" fill="white" stroke="#e0e0e0" stroke-width="1.5" rx="3"/>
  <text x="406" y="101" font-size="9" fill="#888" text-anchor="middle" letter-spacing="0.08em">RX</text>
  <text x="406" y="117" font-size="11" fill="#0d0d0d" text-anchor="middle" font-weight="500">Camera</text>
  <text x="406" y="132" font-size="8" fill="#888" text-anchor="middle">ROI · RSS</text>

  <!-- Arrows -->
  <line x1="124" y1="110" x2="188" y2="110" stroke="#1a56db" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="290" y1="110" x2="354" y2="110" stroke="#1a56db" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Caption -->
  <text x="240" y="192" font-size="8" fill="#888" text-anchor="middle" letter-spacing="0.08em">EXAMPLE FIGURE — OCC SYSTEM BLOCK DIAGRAM</text>
</svg>
