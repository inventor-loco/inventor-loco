<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Optical Camera Communications (OCC) — Vicente Matus, PhD</title>
  <link rel="icon" href="../mark.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <link rel="manifest" href="../site.webmanifest">
  <meta name="theme-color" content="#0d0d0d">
  <link rel="stylesheet" href="../styles/icons.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../template/template.css" />
</head>
<body>

  <!-- Sidebar (fixed overlay, toggled by JS) -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="course-badge" id="sidebar-badge"></div>
      <div class="sidebar-title" id="sidebar-title"></div>
      <div class="sidebar-meta"  id="sidebar-meta"></div>
    </div>
    <nav class="lesson-nav" id="lesson-nav"></nav>
  </aside>

  <!-- Backdrop (mobile only) -->
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

  <!-- Main area — shifts right on desktop when sidebar open -->
  <div class="main-area" id="main-area">

    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menu-toggle" title="Toggle lesson index">☰</button>
        <div class="topbar-lesson">
          Lesson <span class="counter" id="lesson-counter">— / —</span>
          &nbsp;·&nbsp;
          <span class="lesson-title-top" id="lesson-title-top">…</span>
        </div>
      </div>
      <div class="topbar-right">
        <button class="nav-btn" id="prev-btn" onclick="window._course.prev()" disabled>←<span class="btn-label"> Prev</span></button>
        <button class="nav-btn primary" id="next-btn" onclick="window._course.next()"><span class="btn-label">Next </span>→</button>
        <span class="progress-pill" id="progress-pill">— / —</span>
        <a href="../courses.html" class="exit-btn" id="back-link" title="Back to courses">✕<span class="btn-label"> Courses</span></a>
      </div>
    </div>

    <div class="lesson-area" id="lesson-area">
      <div id="slide-container"></div>
    </div>

  </div><!-- /main-area -->

  <div class="progress-bar" id="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <script src="data/course-data-occ.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="../template/template.js"></script>
</body>
</html>
