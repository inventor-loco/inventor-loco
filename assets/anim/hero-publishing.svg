<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 140" width="100%" preserveAspectRatio="xMidYMid meet">
  <title>Publishing — Figure drop-in animation</title>
  <style>
    @media (prefers-reduced-motion: reduce) {
      animate, animateMotion, animateTransform { display: none; }
    }
  </style>

  <rect width="320" height="140" fill="#fff" stroke="#e0e0e0"/>

  <!-- Article page shell -->
  <rect x="40" y="18" width="240" height="110" fill="#fafafa" stroke="#0d0d0d" stroke-width="1"/>

  <!-- Text lines (above figure) -->
  <g stroke="#0d0d0d" stroke-width="0.6" opacity="0.7">
    <path d="M 55 35 H 265"/>
    <path d="M 55 42 H 235"/>
    <path d="M 55 49 H 260"/>
  </g>

  <!-- Text lines (below figure) -->
  <g stroke="#0d0d0d" stroke-width="0.6" opacity="0.7">
    <path d="M 55 105 H 265"/>
    <path d="M 55 112 H 240"/>
    <path d="M 55 119 H 258"/>
  </g>

  <!-- Figure block dropping in -->
  <rect x="80" y="60" width="160" height="36" fill="#ede9fe" stroke="#7c3aed" stroke-width="1">
    <animate attributeName="y" values="-40;60" dur="1s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze"/>
  </rect>

  <!-- Chart line drawing across the figure -->
  <path d="M 90 88 L 110 76 L 140 82 L 170 68 L 200 74 L 230 64" fill="none" stroke="#7c3aed" stroke-width="1.2">
    <animate attributeName="stroke-dasharray" from="0 300" to="300 0" dur="1s" fill="freeze" begin="1s"/>
  </path>

  <!-- Figure label fading in -->
  <text x="160" y="100" font-family="IBM Plex Mono,monospace" font-size="7" fill="#7c3aed" text-anchor="middle" opacity="0">FIG. 1
    <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="2s"/>
  </text>
</svg>
